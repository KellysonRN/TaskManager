<div class="login-container">
  <div class="login-card">
    <h1>Task Manager</h1>
    <h2>Sign In</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          autocomplete="email"
        />
        <span
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
          class="error-hint"
        >
          <span *ngIf="form.get('email')?.hasError('required')">Email is required.</span>
          <span *ngIf="form.get('email')?.hasError('email')">Enter a valid email address.</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <span
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
          class="error-hint"
        >
          Password is required.
        </span>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error" data-testid="error-message">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="btn-login"
      >
        <span *ngIf="isLoading" data-testid="loading">Signing in…</span>
        <span *ngIf="!isLoading">Sign In</span>
      </button>
    </form>
  </div>
</div>
